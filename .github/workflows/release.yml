name: Build and Release Zenthra View

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release - ${{ matrix.platform.os-name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            os-name: linux
            target: x86_64-unknown-linux-gnu
            bin: image-viewer
            archive_name: zenthra-view-linux-x86_64.tar.gz
          - os: windows-latest
            os-name: windows
            target: x86_64-pc-windows-msvc
            bin: image-viewer.exe
            archive_name: zenthra-view-windows-x86_64.zip
          - os: macos-latest
            os-name: macos-universal
            target: aarch64-apple-darwin
            bin: image-viewer
            archive_name: zenthra-view-macos-universal.tar.gz

    steps:
      - name: Checkout Core Framework
        uses: actions/checkout@v4
        with:
          repository: kabirajpan/zenthra-v2
          path: zenthra

      - name: Checkout Viewer
        uses: actions/checkout@v4
        with:
          path: zenthra/apps/image_viewer

      - name: Install System Dependencies (Linux)
        if: matrix.platform.os-name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libx11-xcb-dev libxkbcommon-dev libwayland-dev libegl1-mesa-dev libgbm-dev

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Add Intel macOS target
        if: matrix.platform.os-name == 'macos-universal'
        run: rustup target add x86_64-apple-darwin

      - name: Build Standalone Binary (Non-macOS)
        if: matrix.platform.os-name != 'macos-universal'
        working-directory: zenthra/apps/image_viewer
        run: |
          cargo build --release --bin image-viewer --target ${{ matrix.platform.target }}

      - name: Build Standalone Binaries (macOS Universal)
        if: matrix.platform.os-name == 'macos-universal'
        working-directory: zenthra/apps/image_viewer
        run: |
          cargo build --release --bin image-viewer --target aarch64-apple-darwin
          cargo build --release --bin image-viewer --target x86_64-apple-darwin

      - name: Create Universal macOS Binary
        if: matrix.platform.os-name == 'macos-universal'
        working-directory: zenthra/apps/image_viewer
        run: |
          lipo -create \
            -output target/image-viewer \
            target/aarch64-apple-darwin/release/image-viewer \
            target/x86_64-apple-darwin/release/image-viewer
          file target/image-viewer

      - name: Package Binary (Windows)
        if: matrix.platform.os-name == 'windows'
        run: |
          cd zenthra/apps/image_viewer/target/${{ matrix.platform.target }}/release
          powershell Compress-Archive -Path ${{ matrix.platform.bin }} -DestinationPath ../../../../../${{ matrix.platform.archive_name }}

      - name: Package Binary (Linux)
        if: matrix.platform.os-name == 'linux'
        run: |
          cd zenthra/apps/image_viewer/target/${{ matrix.platform.target }}/release
          tar -czf ../../../../../${{ matrix.platform.archive_name }} ${{ matrix.platform.bin }}

      - name: Package Binary (macOS Universal)
        if: matrix.platform.os-name == 'macos-universal'
        run: |
          cd zenthra/apps/image_viewer/target
          tar -czf ../../../../${{ matrix.platform.archive_name }} image-viewer

      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.platform.archive_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
